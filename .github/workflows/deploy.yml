2. Add to functions.js:

javascript
const { initializeApp } = require('firebase-admin/app');
const { getAI, getGenerativeModel, GoogleAIBackend } = require('firebase/ai');

exports.generateSubtasks = onDocumentCreated(
  { document: 'todos/{taskId}', region: 'europe-west2' },
  async (event) => {
    const task = event.data.data();
    if (!task.title) return;

    const ai = getAI(getApp(), { backend: new GoogleAIBackend() });
    const model = getGenerativeModel(ai, { model: 'gemini-2.0-flash' });

    const result = await model.generateContent(
      `A couple uses a shared household planner. They just added a task: "${task.title}".
       Suggest 3-4 short practical subtasks. 
       Reply ONLY with a JSON array of strings, no markdown. Example: ["Buy milk","Check expiry dates"]`
    );

    const text = result.response.text();
    const subtasks = JSON.parse(text.trim());

    const db = getFirestore();
    const batch = db.batch();
    subtasks.forEach((title, i) => {
      const ref = db.collection('todos').doc(event.params.taskId)
                    .collection('subtasks').doc();
      batch.set(ref, {
        title,
        completed: false,
        order: i,
        aiGenerated: true,
        createdAt: FieldValue.serverTimestamp()
      });
    });
    await batch.commit();
  }
);
