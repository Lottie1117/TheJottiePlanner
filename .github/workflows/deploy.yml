how would i use firebase AI logic to introduce AI generated subtasks when a new task is added?

10:28
Here's how it would work with the current stack:

The approach: Firebase Extension + Cloud Function

The cleanest way is Firestore + Gemini via the Firebase Genkit/AI Logic extension, which lets you call Gemini directly from a Cloud Function without managing API keys manually.

Step 1 — Install the extension

In Firebase Console → Extensions → "Build with Gemini" (or install firestore-genkit-chatbot). Alternatively, use the Vertex AI in Firebase SDK directly in your Cloud Function — this is the more controllable approach.

Step 2 — The trigger flow

User adds task → Firestore doc created in 'todos' 
→ Cloud Function triggers on onCreate 
→ Calls Gemini with task title 
→ Writes subtask docs back to 'todos/{taskId}/subtasks'
Your functions.js already deploys to europe-west2 — you'd add one new function there.

Step 3 — What the Cloud Function looks like

javascript
const { onDocumentCreated } = require("firebase-functions/v2/firestore");
const { VertexAI } = require("@google-cloud/vertexai");

exports.generateSubtasks = onDocumentCreated(
  { document: "todos/{taskId}", region: "europe-west2" },
  async (event) => {
    const task = event.data.data();
    if (!task.title) return;

    const vertexAI = new VertexAI({ project: "jottieplans", location: "europe-west1" });
    const model = vertexAI.getGenerativeModel({ model: "gemini-1.5-flash" });

    const prompt = `A couple uses a shared household planner. 
They just added a task: "${task.title}"
Suggest 3-5 short, specific subtasks to help them complete it.
Reply with ONLY a JSON array of strings. Example: ["Buy ingredients","Preheat oven"]`;

    const result = await model.generateContent(prompt);
    const text = result.response.candidates[0].content.parts[0].text;
    const subtasks = JSON.parse(text.replace(/```json|```/g, '').trim());

    const db = admin.firestore();
    const batch = db.batch();
    subtasks.forEach((title, i) => {
      const ref = db.collection('todos').doc(event.params.taskId)
                    .collection('subtasks').doc();
      batch.set(ref, { 
        title, 
        completed: false, 
        order: i,
        aiGenerated: true,
        createdAt: admin.firestore.FieldValue.serverTimestamp() 
      });
    });
    await batch.commit();
  }
);
Step 4 — UX consideration

Since the subtasks arrive asynchronously (1-3 seconds after task creation), you'd want a subtle indicator in the task detail view. The aiGenerated: true flag lets you show them differently — e.g. a small ✨ label — so Lottie and Jonny know which subtasks were suggested vs. manually added, and can delete ones that don't fit.

Two things to check before starting:

Vertex AI API enabled? In Google Cloud Console → APIs → Vertex AI API. It needs to be enabled for jottieplans project. There's a cost but Gemini Flash is very cheap (~$0.00015 per task).
Do you want subtasks generated for every task, or opt-in? For example, a "✨ Suggest subtasks" button on the task detail screen rather than automatic on creation — this avoids generating subtasks for simple tasks like "Buy milk" and gives more control.
Which approach would you prefer — automatic on creation, or a manual trigger button?

